name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
  workflow_dispatch:

env:
  AWS_REGION: 'us-east-1'
  AWS_ROLE_ARN: 'arn:aws:iam::093487613626:role/github-actions-vizeet-me-website'
  S3_BUCKET: 'my-portfolio-website-bucket'
  CF_DISTRIBUTION_ID: 'E1LQW0IG8J5R8W'

jobs:
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync website to S3
        run: |
          aws s3 sync ./website s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "max-age=31536000" \
            --exclude "*.html" \
            --region us-east-2

          # HTML files: no-cache so browsers always get latest
          # NOTE: --exclude must come BEFORE --include; aws s3 sync applies
          # filters in order, so a trailing --exclude "*.*" would override --include "*.html"
          aws s3 sync ./website s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.*" \
            --include "*.html" \
            --region us-east-2

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"
